# staticcheck.conf — project-wide staticcheck configuration.
#
# U1000 (unused code) is enabled globally so dead-code detection stays
# active across the whole module. The only intentional exception is the
# block of retained-for-documentation regex variables in
# cypher/tck/parser_only.go; U1000 is turned off for that package via a
# directory-scoped cypher/tck/staticcheck.conf (which inherits this file
# and adds "-U1000"). Scoping is by DIRECTORY: staticcheck has no per-file
# table form — a `[staticcheck "<path>"]` table-name fails to parse
# (`expected '.' or ']' to end table name`) — so the override lives in its
# own directory config, not here. The ANTLR-generated parser under
# cypher/parser/gen has its own directory config disabling SA4006.
checks = ["inherit"]
