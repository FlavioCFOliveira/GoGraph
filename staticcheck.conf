# staticcheck.conf — project-wide staticcheck configuration.
#
# The two U1000 (unused) warnings for reSingleQuoteSpace and
# reSingleQuoteTemporalArg in cypher/tck/parser_only.go are intentional:
# those regexes are retained for documentation purposes after the
# single-quote-string grammar gap was resolved in v1.3.0 via
# normalizeSingleQuotes. golangci-lint suppresses them via //nolint:unused;
# standalone staticcheck requires this file.
checks = ["inherit", "-U1000"]
