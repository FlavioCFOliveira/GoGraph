# staticcheck.conf — project-wide staticcheck configuration.
#
# U1000 (unused code) is enabled globally. The two intentionally unused
# variables reSingleQuoteSpace and reSingleQuoteTemporalArg in
# cypher/tck/parser_only.go carry //nolint:unused comments (golangci-lint)
# and are also excluded via the path-specific rule below (standalone
# staticcheck). This keeps dead-code detection active for the rest of
# the module while allowing documented documentation-only symbols.
checks = ["inherit"]

[staticcheck "cypher/tck/parser_only.go"]
checks = ["inherit", "-U1000"]
