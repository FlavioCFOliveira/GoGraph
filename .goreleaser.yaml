# goreleaser configuration for GoGraph.
#
# GoGraph is a library, not a CLI, so the primary release artefact
# is the source tarball plus the version-stamped Go module. The
# config also builds the bundled examples and the soak harness as
# convenience binaries so consumers can download a ready-to-run
# soak driver alongside the tagged source.

version: 2

project_name: gograph

before:
  hooks:
    - go mod tidy
    - go vet ./...
    # Software Bill of Materials (CycloneDX JSON, schema 1.5).
    # Emit one document for the whole module — every archive ships
    # the same Go module graph regardless of OS/arch, so a per-archive
    # SBOM would duplicate the same payload. Consumers verify
    # dependencies via this single file plus checksums.txt.
    - cyclonedx-gomod mod -licenses -json -output gograph.cdx.json

builds:
  - id: soak
    main: ./bench/soak
    binary: soak
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }}

archives:
  - id: source-and-tools
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE
      - SECURITY.md
      - docs/**/*
      - gograph.cdx.json

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Software Bill of Materials (CycloneDX JSON, schema 1.5).
#
# The SBOM is generated as a `before:` hook (see top of this file)
# at the repo root via cyclonedx-gomod, then embedded into each
# archive via the `archives.files:` list (gograph.cdx.json).
# Generating once and embedding many times avoids the working-
# directory complications of running cyclonedx-gomod from
# goreleaser's per-archive workdir, and is correct because the Go
# module graph does not vary by OS/arch.
#
# cyclonedx-gomod must be installed before goreleaser is invoked;
# see docs/release.md and .github/workflows/release.yml.

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - "Merge branch"

release:
  github:
    owner: xumiga
    name: GoGraph
  draft: true
  prerelease: auto
  header: |
    GoGraph {{ .Tag }} — see CHANGELOG.md for the per-release entry.
  footer: |
    ---
    Reproducibility: built from commit {{ .FullCommit }} with Go {{ .Env.GOVERSION }}.
