version: "2"

run:
  timeout: 5m
  go: "1.26"
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gocyclo
    - prealloc
    - revive
  exclusions:
    # cypher/parser/gen is the ANTLR-generated Go output (CypherLexer +
    # CypherParser). The generator emits idiomatic-Java style (unused
    # SA4006 assignments, deep switches, repeated identifiers shadowed
    # at scope, etc.) that the project's linters would otherwise
    # flag noisily. Re-generating the file via `make generate-cypher-parser`
    # would reset any hand-edit, so excluding the directory wholesale is
    # the canonical reconciliation. Regeneration policy is documented
    # in the install-antlr / generate-cypher-parser Makefile targets.
    paths:
      - cypher/parser/gen
    rules:
      # defer/inline res.Close() without error check is intentional in tests;
      # teardown failures are surfaced via t.Fatalf in the test body.
      - linters: [errcheck]
        path: "_test\\.go"
        text: "Error return value of.*Close.*is not checked"
      # Table-driven and scenario-driven test functions naturally exceed gocyclo 15.
      - linters: [gocyclo]
        path: "_test\\.go"
        text: "cyclomatic complexity"
      # revive: redefines-builtin-id in essentials.go — cap/min used as local
      # variable names in pre-existing non-exported helpers.
      - linters: [revive]
        path: "cypher/funcs/essentials\\.go"
        text: "redefines-builtin-id"
      # revive: unexported-return for expandOption — intentional unexported
      # functional-option type; renaming would break callers.
      - linters: [revive]
        path: "cypher/exec/cyphermorphism\\.go"
        text: "unexported-return"
      # gocritic: commentedOutCode — inline intent comment in test, not dead code.
      - linters: [gocritic]
        path: "cypher/funcs/essentials_test\\.go"
        text: "commentedOutCode"
      # revive: empty-block — intentional no-op guard in cancellation test.
      - linters: [revive]
        path: "cypher/exec/parallel_test\\.go"
        text: "empty-block"
      # revive: unused-parameter in test helpers where t is required by interface.
      - linters: [revive]
        path: "_test\\.go"
        text: "unused-parameter"
      # revive: unexported-return in eval_extra_test helper stub.
      - linters: [revive]
        path: "cypher/expr/eval_extra_test\\.go"
        text: "unused-parameter"
      # gocyclo: ir/explain.go operatorName — large switch with one case per
      # operator type; splitting would add indirection without reducing real complexity.
      - linters: [gocyclo]
        path: "cypher/ir/explain\\.go"
        text: "cyclomatic complexity"
      # gocritic: builtinShadow in essentials.go — cap/min as local variable names
      # in pre-existing non-exported helpers; renaming would obscure intent.
      - linters: [gocritic]
        path: "cypher/funcs/essentials\\.go"
        text: "builtinShadow"
      # gosec G104: standalone res.Close() in tests — teardown, not production code.
      - linters: [gosec]
        path: "_test\\.go"
        text: "G104"
      # staticcheck SA9003: empty branch with explanatory comment in parallel_test.go.
      - linters: [staticcheck]
        path: "cypher/exec/parallel_test\\.go"
        text: "SA9003"
      # revive: 'cap'/'copy' as local variable names in tests — common idiom for
      # capacity/copy fixtures; renaming obscures intent. Production code remains
      # subject to the redefines-builtin-id rule.
      - linters: [revive]
        path: "_test\\.go"
        text: "redefines-builtin-id"
      # gocritic: builtinShadow in tests for the same reason.
      - linters: [gocritic]
        path: "_test\\.go"
        text: "builtinShadow"
      # gosec G204 / G304 / G703: subprocess and file-inclusion warnings in test
      # code rely on trusted, in-process inputs (test temp dirs, locally built
      # helper binaries, deterministic test paths). Production code keeps full
      # gosec coverage.
      - linters: [gosec]
        path: "_test\\.go"
        text: "G204"
      - linters: [gosec]
        path: "_test\\.go"
        text: "G304"
      - linters: [gosec]
        path: "_test\\.go"
        text: "G703"
      # gosec G404: tests intentionally use math/rand or PCG for deterministic
      # reproducibility; cryptographic randomness is not required.
      - linters: [gosec]
        path: "_test\\.go"
        text: "G404"
      # gosec G302: tests sometimes restore directory permissions to 0o750 after
      # deliberately stripping them to probe EACCES; the executable bit is
      # required for traversal during the test cleanup.
      - linters: [gosec]
        path: "_test\\.go"
        text: "G302"
      # gocritic: unnamedResult is a style preference, not a defect; allowed in
      # both production and test code where the return-type signature is
      # self-documenting.
      - linters: [gocritic]
        text: "unnamedResult"
      # gocritic: hugeParam on test helpers and shape-loader functions that
      # accept descriptor structs by value for readability; the call sites are
      # not on hot paths.
      - linters: [gocritic]
        path: "internal/shapegen/graphalytics\\.go"
        text: "hugeParam"
      - linters: [gocritic]
        path: "examples/24_social_network_cli/cmd_seed\\.go"
        text: "hugeParam"
      # gocritic: exitAfterDefer in example main programs is the conventional
      # demo pattern; the temp-dir leak on Fatalf is bounded (per-run /tmp
      # entry) and not worth the cost of a typed exit code in didactic code.
      # Production binaries (cmd/) keep the rule active.
      - linters: [gocritic]
        path: "examples/.*\\.go"
        text: "exitAfterDefer"
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gocyclo:
      min-complexity: 15
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
    gosec:
      excludes:
        # G115: integer overflow conversion. Excluded project-wide
        # because the canonical use cases in graphs and persistence
        # involve converting between graph.NodeID (uint64) and the
        # smaller types ANTLR/Roaring/CRC32C require — e.g.,
        # uint32(nodeID) into a Roaring container, int(rune) for
        # parser tokens, int32(slotIdx) into the union-find slice
        # backing. Every site has a documented upper bound (NodeID
        # cap, parser token alphabet, slice length), so the runtime
        # truncation G115 warns about cannot occur. Re-enable if a
        # new code site lacks the upper-bound invariant.
        - G115
    gocritic:
      enabled-tags:
        - performance
        - diagnostic
        - style
      disabled-checks:
        - ifElseChain
        - whyNoLint

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - gograph

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
