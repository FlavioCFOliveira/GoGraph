version: "2"

run:
  timeout: 5m
  go: "1.23"
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gocyclo
    - revive
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
    gosec:
      excludes:
        - G115
    gocritic:
      enabled-tags:
        - performance
        - diagnostic
        - style
      disabled-checks:
        - ifElseChain
        - whyNoLint

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - gograph

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
