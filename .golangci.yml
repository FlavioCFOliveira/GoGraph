version: "2"

run:
  timeout: 5m
  go: "1.26"
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gocyclo
    - revive
  exclusions:
    paths:
      - cypher/parser/gen
    rules:
      # defer/inline res.Close() without error check is intentional in tests;
      # teardown failures are surfaced via t.Fatalf in the test body.
      - linters: [errcheck]
        path: "_test\\.go"
        text: "Error return value of.*Close.*is not checked"
      # Table-driven and scenario-driven test functions naturally exceed gocyclo 15.
      - linters: [gocyclo]
        path: "_test\\.go"
        text: "cyclomatic complexity"
      # revive: redefines-builtin-id in essentials.go — cap/min used as local
      # variable names in pre-existing non-exported helpers.
      - linters: [revive]
        path: "cypher/funcs/essentials\\.go"
        text: "redefines-builtin-id"
      # revive: unexported-return for expandOption — intentional unexported
      # functional-option type; renaming would break callers.
      - linters: [revive]
        path: "cypher/exec/cyphermorphism\\.go"
        text: "unexported-return"
      # gocritic: commentedOutCode — inline intent comment in test, not dead code.
      - linters: [gocritic]
        path: "cypher/funcs/essentials_test\\.go"
        text: "commentedOutCode"
      # revive: empty-block — intentional no-op guard in cancellation test.
      - linters: [revive]
        path: "cypher/exec/parallel_test\\.go"
        text: "empty-block"
      # revive: unused-parameter in test helpers where t is required by interface.
      - linters: [revive]
        path: "_test\\.go"
        text: "unused-parameter"
      # revive: unexported-return in eval_extra_test helper stub.
      - linters: [revive]
        path: "cypher/expr/eval_extra_test\\.go"
        text: "unused-parameter"
      # gocyclo: ir/explain.go operatorName — large switch with one case per
      # operator type; splitting would add indirection without reducing real complexity.
      - linters: [gocyclo]
        path: "cypher/ir/explain\\.go"
        text: "cyclomatic complexity"
      # gocritic: builtinShadow in essentials.go — cap/min as local variable names
      # in pre-existing non-exported helpers; renaming would obscure intent.
      - linters: [gocritic]
        path: "cypher/funcs/essentials\\.go"
        text: "builtinShadow"
      # gosec G104: standalone res.Close() in tests — teardown, not production code.
      - linters: [gosec]
        path: "_test\\.go"
        text: "G104"
      # staticcheck SA9003: empty branch with explanatory comment in parallel_test.go.
      - linters: [staticcheck]
        path: "cypher/exec/parallel_test\\.go"
        text: "SA9003"
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gocyclo:
      min-complexity: 15
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
    gosec:
      excludes:
        - G115
    gocritic:
      enabled-tags:
        - performance
        - diagnostic
        - style
      disabled-checks:
        - ifElseChain
        - whyNoLint

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - gograph

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
