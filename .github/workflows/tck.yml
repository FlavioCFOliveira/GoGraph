name: TCK Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # weekly Monday 4am UTC

permissions:
  contents: read

# Pin the IANA time-zone database so temporal TCK scenarios are deterministic
# regardless of the runner's system tzdata build (slim vs fat). Go's time
# package reads ZONEINFO before the system database. See
# cypher/tck/testdata/README.md.
env:
  ZONEINFO: ${{ github.workspace }}/cypher/tck/testdata/zoneinfo-slim.zip

concurrency:
  group: tck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tck:
    name: openCypher TCK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Parser-level conformance
        run: go test ./cypher/tck/... -run 'TestTCKReport|TestTCKParserOnly' -v -count=1 -timeout 60s
      - name: Conformance gate (≥90%)
        run: |
          RATE=$(go test ./cypher/tck/... -run TestTCKReport -v -count=1 2>&1 | grep -oP 'overall-rate=\K[0-9.]+')
          echo "Overall pass rate: ${RATE}%"
          python3 -c "import sys; rate=float('${RATE}'); sys.exit(0 if rate >= 90.0 else 1)"
      - name: TCK execution gate (3897 scenarios)
        run: go test ./cypher/tck/... -run TestTCKExecution -v -count=1 -timeout 600s
