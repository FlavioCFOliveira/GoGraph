name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Pin the IANA time-zone database so temporal TCK scenarios in the
# pre-release gate are deterministic regardless of the runner's system
# tzdata build (slim vs fat). Go's time package reads ZONEINFO before the
# system database. Mirrors ci.yml / tck.yml / nightly.yml. Without this the
# pre-1879 Europe/Stockholm offset in Temporal2.feature diverges and the TCK
# gate fails. See cypher/tck/testdata/README.md.
env:
  ZONEINFO: ${{ github.workspace }}/cypher/tck/testdata/zoneinfo-slim.zip

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      # Release gate: refuse to publish unless the release commit passes the
      # SAME canonical gate the local `make release` path runs —
      # `make release-preflight`. That target is the single source of truth:
      # it enforces the release-accuracy checks (CHANGELOG ## [x.y.z],
      # release-notes/VERSION.md, README current-release, SECURITY.md version
      # table, docs/benchmarks/VERSION.md), the coverage gate, the headline
      # bench gate, AND the correctness gate (scripts/pre-release.sh: vet +
      # build + test -race + golangci-lint + TCK). Previously this workflow ran
      # only pre-release.sh, silently bypassing every accuracy gate added in
      # cce0bc4 — see #1444.
      - name: Install golangci-lint (needed by the correctness gate)
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          install-mode: binary
          # install-only: just put the golangci-lint binary on PATH for
          # scripts/pre-release.sh to invoke. Without this the action runs
          # `golangci-lint run --version`, which fails on v2.x with
          # "unknown flag: --version" (run has no --version flag) — that
          # broke the release run.
          install-only: true
      - name: Release pre-flight gate (release-accuracy + coverage + bench + correctness)
        run: VERSION="${GITHUB_REF_NAME}" make release-preflight
      - name: Install cyclonedx-gomod (SBOM generator)
        run: |
          # Pinned to an exact released version so the SBOM generator in the
          # release path cannot be silently swapped by a moved/poisoned
          # upstream release (CWE-494). Bump this pin manually in lockstep
          # with the GitHub Actions SHA pins. cyclonedx-gomod is invoked by goreleaser
          # through the `before:` hook in .goreleaser.yaml; the version printed
          # below must equal the pin.
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0
          cyclonedx-gomod version
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOVERSION: "1.26"
