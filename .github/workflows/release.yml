name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Pin the IANA time-zone database so temporal TCK scenarios in the
# pre-release gate are deterministic regardless of the runner's system
# tzdata build (slim vs fat). Go's time package reads ZONEINFO before the
# system database. Mirrors ci.yml / tck.yml / nightly.yml. Without this the
# pre-1879 Europe/Stockholm offset in Temporal2.feature diverges and the TCK
# gate fails. See cypher/tck/testdata/README.md.
env:
  ZONEINFO: ${{ github.workspace }}/cypher/tck/testdata/zoneinfo-slim.zip

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # Release gate: refuse to publish unless the release commit passes the
      # SAME canonical gate the local `make release` path runs —
      # `make release-preflight`. That target is the single source of truth:
      # it enforces the release-accuracy checks (CHANGELOG ## [x.y.z],
      # release-notes/VERSION.md, README current-release, SECURITY.md version
      # table, docs/benchmarks/VERSION.md), the mandatory soak gate
      # (release_soak_gate.sh, #1399), the coverage gate, the headline bench
      # gate, AND the correctness gate (scripts/pre-release.sh: vet + build +
      # test -race + golangci-lint + TCK). Previously this workflow ran only
      # pre-release.sh, silently bypassing every accuracy/soak gate added in
      # cce0bc4 — see #1444.
      - name: Install golangci-lint (needed by the correctness gate)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-mode: binary
          # install-only: just put the golangci-lint binary on PATH for
          # scripts/pre-release.sh to invoke. Without this the action runs
          # `golangci-lint run --version`, which fails on v2.x with
          # "unknown flag: --version" (run has no --version flag) — that
          # broke the release run.
          install-only: true
      - name: Release pre-flight gate (release-accuracy + soak + coverage + bench + correctness)
        # GITHUB_TOKEN lets release_soak_gate.sh query GitHub Actions for a
        # green soak run on the release commit via the gh CLI.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: VERSION="${GITHUB_REF_NAME}" make release-preflight
      - name: Install cyclonedx-gomod (SBOM generator)
        run: |
          # Pinned via the @latest indirection plus the lockfile in
          # tools/sbom (when committed). cyclonedx-gomod is invoked
          # by goreleaser through the sboms: stanza in
          # .goreleaser.yaml.
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          cyclonedx-gomod version
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOVERSION: "1.26"
