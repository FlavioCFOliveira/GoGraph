name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Pin the IANA time-zone database so temporal TCK scenarios in the
# pre-release gate are deterministic regardless of the runner's system
# tzdata build (slim vs fat). Go's time package reads ZONEINFO before the
# system database. Mirrors ci.yml / tck.yml / nightly.yml. Without this the
# pre-1879 Europe/Stockholm offset in Temporal2.feature diverges and the TCK
# gate fails. See cypher/tck/testdata/README.md.
env:
  ZONEINFO: ${{ github.workspace }}/cypher/tck/testdata/zoneinfo-slim.zip

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # Pre-flight gate: refuse to publish a release if the release
      # commit fails the same checks the CI workflow enforces on
      # main. Branch protection on main (documented in
      # docs/release.md) is the upstream guard; this is the
      # downstream safety net. The canonical implementation lives in
      # scripts/pre-release.sh so 'make release' and the release.yml
      # workflow agree on what the gate actually means.
      - name: Install golangci-lint (needed by pre-release.sh)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-mode: binary
          # install-only: just put the golangci-lint binary on PATH for
          # scripts/pre-release.sh to invoke. Without this the action runs
          # `golangci-lint run --version`, which fails on v2.x with
          # "unknown flag: --version" (run has no --version flag) — that
          # broke the v3.0.0 release run.
          install-only: true
      - name: Pre-release gate (vet + build + test -race + lint + TCK)
        run: bash scripts/pre-release.sh "${GITHUB_REF_NAME}"
      - name: Install cyclonedx-gomod (SBOM generator)
        run: |
          # Pinned via the @latest indirection plus the lockfile in
          # tools/sbom (when committed). cyclonedx-gomod is invoked
          # by goreleaser through the sboms: stanza in
          # .goreleaser.yaml.
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          cyclonedx-gomod version
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOVERSION: "1.26"
