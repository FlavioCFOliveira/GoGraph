name: Nightly

# Runs the CI-safe nightly test layer daily at 03:00 UTC. This layer
# includes the short and soak layers, plus long-running tests guarded by
# //go:build nightly or testlayers.RequireNightly(t), with the exception
# of search/extern (RMAT scale-20, DIMACS9 full) which require more RAM
# than GitHub free runners provide under the race detector.
#
# For a full nightly run including search/extern, use the manual
# heavy-nightly.yml workflow (workflow_dispatch only) on a machine with
# ≥ 16 GB RAM.
#
# See docs/test-layers.md for the layer specification and Makefile
# target reference.

on:
  schedule:
    # Daily at 03:00 UTC — offset from the ci.yml daily run (04:13 UTC)
    # so the two scheduled runs do not compete for runner capacity.
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Allow manual triggering for on-demand nightly runs.

permissions:
  contents: read

# Pin the IANA time-zone database so temporal TCK scenarios are deterministic
# regardless of the runner's system tzdata build (slim vs fat). Go's time
# package reads ZONEINFO before the system database. See
# cypher/tck/testdata/README.md.
env:
  ZONEINFO: ${{ github.workspace }}/cypher/tck/testdata/zoneinfo-slim.zip

jobs:
  nightly:
    name: nightly layer (race)
    runs-on: ubuntu-latest
    # test-nightly-ci targets 50 min on a 2-CPU runner; 90 min gives ample
    # headroom for slower hardware without tying up the runner for 6 hours.
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Module integrity
        run: |
          go mod download
          go mod verify

      - name: Build
        run: go build ./...

      - name: Test (nightly layer + race)
        # GODEBUG=gctrace=1 surfaces memory growth during long-running tests.
        #
        # pipefail ensures `make test-nightly` exit code is not masked by
        # `tee`. Without it, bash only checks tee's exit code (always 0),
        # so any failure — including OOM kills (exit 137) and signal
        # terminations — passes silently when the log contains no ^FAIL line.
        #
        # `continue-on-error: true` is intentionally absent: the step must
        # fail visibly so GitHub marks the job red immediately, rather than
        # deferring detection to a later "Fail if tests failed" step that
        # can only catch ^FAIL lines (not OOM kills or silent crashes).
        # The upload steps use `if: always()` so artefacts are preserved
        # regardless of whether this step succeeds or fails.
        shell: bash
        run: |
          set -o pipefail
          GODEBUG=gctrace=1 make test-nightly-ci 2>&1 | tee /tmp/nightly-test.log

      - name: Verify test log contains passing signal
        # Secondary guard: even if `make test-nightly` exits 0 but
        # the log is empty or contains no "^ok " lines (e.g. all
        # packages were skipped or the runner ran out of memory before
        # any package finished), surface the anomaly as a failure.
        #
        # This guards against a rare but real case where pipefail
        # cannot help: `make` itself exits 0 due to a bug in the
        # Makefile target while no tests actually ran.
        if: success()
        run: |
          if ! grep -q "^ok " /tmp/nightly-test.log 2>/dev/null; then
            echo "::error::Nightly test log contains no passing 'ok' lines — no packages ran or all were skipped"
            exit 1
          fi

      - name: CPU profile (nightly regression workload)
        # Run a focused benchmark with CPU profiling to detect hot-path
        # regressions across nightly builds. The profile is uploaded as
        # an artefact for offline flamegraph analysis.
        # Mirrors the test-nightly-ci package set (excludes search/extern)
        # so this step does not OOM the runner. The || true is intentional:
        # benchmark failure must not mask the test failure above.
        if: always()
        run: |
          CI_PKGS=$(go list -tags=soak,nightly ./... | grep -v 'search/extern$')
          go test -bench=. -benchmem -count=1 -tags=soak,nightly \
            -cpuprofile=/tmp/nightly-cpu.prof \
            -memprofile=/tmp/nightly-mem.prof \
            $CI_PKGS > /tmp/nightly-bench.txt 2>&1 || true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-test-logs-${{ github.run_id }}
          retention-days: 30
          path: |
            /tmp/nightly-test.log

      - name: Upload pprof artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-pprof-${{ github.run_id }}
          retention-days: 30
          path: |
            /tmp/nightly-cpu.prof
            /tmp/nightly-mem.prof
            /tmp/nightly-bench.txt
