name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily 04:13 UTC to catch newly-disclosed CVEs even when no
    # commits land that day.
    - cron: "13 4 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test + race
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Tidy check
        run: |
          go mod tidy
          if [[ -n "$(git status --porcelain go.mod go.sum 2>/dev/null)" ]]; then
            echo "::error::go.mod / go.sum drift; run 'make tidy' locally and commit the result, or document the intended dependency change in the PR description"
            git --no-pager diff -- go.mod go.sum
            exit 1
          fi
      - name: Module integrity (download + verify)
        run: |
          go mod download
          go mod verify
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Race
        run: go test -race ./...
      - name: TCK conformance report
        run: |
          go test ./cypher/tck/... -run TestTCKReport -v -count=1 -timeout 60s 2>&1 | tee tck-report.txt
          echo "## TCK Conformance Report" >> $GITHUB_STEP_SUMMARY
          grep -E "total=|pass-rate|overall-rate" tck-report.txt >> $GITHUB_STEP_SUMMARY || true

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.5.0
          args: --timeout=5m

  stress:
    name: concurrency stress (race)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run stress tests under -race
        run: go test -race -tags=stress -timeout=3m ./internal/stress/...

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  coverage-gate:
    name: coverage gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run coverage gate
        run: make cover-gate
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: |
            cover.out
            cover.lib.out

  benchstat:
    name: benchstat regression gate
    # Only runs on pull-requests targeting main — the regression gate
    # compares the PR head against a baseline run of the merge base.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (PR head with merge base)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Bench (baseline = merge base)
        run: |
          base_sha="$(git merge-base origin/${{ github.base_ref }} HEAD)"
          git checkout "$base_sha"
          ./scripts/run_headline_bench.sh > /tmp/bench-base.txt
      - name: Bench (PR head)
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          ./scripts/run_headline_bench.sh > /tmp/bench-head.txt
      - name: Compare
        run: |
          benchstat /tmp/bench-base.txt /tmp/bench-head.txt | tee /tmp/bench-diff.txt
          if grep -E "^[A-Za-z_/].* +[0-9]+\.[0-9]+(µs|ms|ns)/op .* +([6-9]\.[0-9]+|[1-9][0-9]+(\.[0-9]+)?)%" /tmp/bench-diff.txt; then
            echo "::error::Headline benchmark regressed by more than 5%"
            exit 1
          fi
      - name: Upload diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchstat
          path: |
            /tmp/bench-base.txt
            /tmp/bench-head.txt
            /tmp/bench-diff.txt
