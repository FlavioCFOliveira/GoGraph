name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily 04:13 UTC to catch newly-disclosed CVEs even when no
    # commits land that day.
    - cron: "13 4 * * *"

permissions:
  contents: read

# Pin the IANA time-zone database so temporal TCK scenarios are deterministic
# regardless of the runner's system tzdata build (slim vs fat). Go's time
# package reads ZONEINFO before the system database. See
# cypher/tck/testdata/README.md.
env:
  ZONEINFO: ${{ github.workspace }}/cypher/tck/testdata/zoneinfo-slim.zip

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test + race
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history: the doc-freshness check verifies that each reference
          # doc's footer SHA is reachable from HEAD. A shallow (depth-1) clone
          # makes every historical SHA "unknown" and fails the step.
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Tidy check
        run: |
          go mod tidy
          if [[ -n "$(git status --porcelain go.mod go.sum 2>/dev/null)" ]]; then
            echo "::error::go.mod / go.sum drift; run 'make tidy' locally and commit the result, or document the intended dependency change in the PR description"
            git --no-pager diff -- go.mod go.sum
            exit 1
          fi
      - name: Module integrity (download + verify)
        run: |
          go mod download
          go mod verify
      - name: Doc freshness (persistence, cypher, bolt)
        run: bash scripts/check_doc_freshness.sh
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Compile soak/nightly layers (deferred-layer guard)
        # The short layer compiles none of the soak/nightly-tagged test files,
        # so a compile break in those ACID-gating tests would otherwise pass
        # every PR gate and surface only in the next scheduled run. This step
        # builds and vets the module under -tags=soak and -tags=soak,nightly
        # so the break is caught on the PR that introduces it.
        run: make check-soak-build
      - name: Test (short layer + race)
        run: make test-short
      - name: TCK conformance report
        run: |
          go test ./cypher/tck/... -run TestTCKReport -v -count=1 -timeout 60s 2>&1 | tee tck-report.txt
          echo "## TCK Conformance Report" >> $GITHUB_STEP_SUMMARY
          grep -E "total=|pass-rate|overall-rate" tck-report.txt >> $GITHUB_STEP_SUMMARY || true

  timing-budget:
    name: short-layer per-package timing budget
    # Enforces the <60s/pkg short-layer budget documented in
    # docs/test-layers.md. Runs in its own job (parallel to build-test) so it
    # adds no wall-clock to the critical path. SOFT_BUDGET (60s) warns; a
    # package over HARD_BUDGET (240s = 4x the budget) fails the job, catching a
    # genuine runaway without flaking on a package that is merely near the
    # line on a slow runner.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run short layer and check per-package timings
        shell: bash
        env:
          SOFT_BUDGET: "60"
          HARD_BUDGET: "240"
        run: |
          set -o pipefail
          make test-short-timings | tee "$GITHUB_STEP_SUMMARY"

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          args: --timeout=5m

  stress:
    name: concurrency stress (race)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run stress tests under -race
        run: go test -race -tags=stress -timeout=3m ./internal/stress/...

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  coverage-gate:
    name: coverage gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run coverage gate
        run: make cover-gate
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-profile
          path: |
            cover.out
            cover.lib.out

  benchstat:
    name: benchstat regression gate
    # Only runs on pull-requests targeting main — the regression gate
    # compares the PR head against a baseline run of the merge base.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (PR head with merge base)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Bench (baseline = merge base)
        run: |
          base_sha="$(git merge-base origin/${{ github.base_ref }} HEAD)"
          git checkout "$base_sha"
          ./scripts/run_headline_bench.sh > /tmp/bench-base.txt
      - name: Bench (PR head)
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          ./scripts/run_headline_bench.sh > /tmp/bench-head.txt
      - name: Compare
        # bench_gate.sh uses `benchstat -format csv` to detect regressions.
        # The old grep on ns/op/µs/ms tokens never fired because modern
        # benchstat prints "sec/op" with SI prefixes (e.g. "1.000m ± ∞") and
        # no µs/ms/ns token in the diff output.  CSV parsing is format-stable.
        # Threshold is +10 %: a PR must not regress a headline benchmark by
        # more than 10 % relative to its merge base.
        #
        # shell: bash + `set -o pipefail` are explicit, not implicit: the
        # `gate | tee` shape masks the gate's exit code under any shell that
        # does not enable pipefail (tee always exits 0). GitHub's default
        # Linux/macOS run shell happens to set pipefail today, but a later
        # `defaults.run.shell:` or step-level `shell:` without it would
        # silently un-gate the regression check. This mirrors the discipline
        # nightly.yml applies for the same reason (see 9a52bc6).
        shell: bash
        run: |
          set -o pipefail
          bash scripts/bench_gate.sh /tmp/bench-base.txt /tmp/bench-head.txt 10 | tee /tmp/bench-diff.txt
      - name: Upload diff
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchstat
          path: |
            /tmp/bench-base.txt
            /tmp/bench-head.txt
            /tmp/bench-diff.txt
