name: Soak

# The 4-hour, 1024-connection Bolt soak test is the canonical
# reliability gate before promoting a release candidate to stable
# (see docs/semver.md). It is long-running (4h wall-clock) and not
# needed on every push, so it is dispatched on demand. Its memory now
# fits a GitHub-hosted runner (~0.8 GiB RSS) — see the run step for why
# the race detector is omitted.

on:
  # Manual dispatch only — at 4 hours wall-clock the soak is too long for a
  # routine scheduled run. Trigger it before promoting a release candidate,
  # or with a shorter `duration` for a quick within-budget reliability check.
  workflow_dispatch:
    inputs:
      duration:
        description: "Soak duration (e.g. '4h', '1h', '15m')"
        required: false
        default: "4h"

permissions:
  contents: read

concurrency:
  # Allow exactly one soak run at a time per ref. A new scheduled or
  # manual run cancels any earlier one that has not finished yet so a
  # missed week does not pile up two consecutive 4-hour jobs.
  group: soak-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bolt-soak:
    name: Bolt soak (1024 connections, 4h endurance, no -race)
    runs-on: ubuntu-latest
    # GitHub Actions caps standard runners at 6 hours; give the soak
    # the full window so the gate also covers slower hardware.
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Module integrity (download + verify)
        run: |
          go mod download
          go mod verify

      - name: Prepare soak-artefacts directory
        run: |
          rm -rf soak-artefacts
          mkdir -p soak-artefacts

      - name: Run Bolt soak
        env:
          SOAK_ARTEFACTS: soak-artefacts
          # The workflow_dispatch `duration` input drives the workload window
          # (default 4h); the test falls back to 4h when SOAK_DURATION is unset.
          SOAK_DURATION: ${{ inputs.duration }}
          GODEBUG: "gctrace=1"
        run: |
          set -euxo pipefail
          # The soak runs WITHOUT the race detector. This is an *endurance*
          # gate — it measures heap / goroutine / FD stability over hours. The
          # race detector's off-heap shadow memory for 1024 concurrent
          # connections pushed RSS past the GitHub-hosted runner's RAM and the
          # job was killed (exit 143) ~17 min in. Without -race the same
          # 1024-connection workload peaks at ~0.8 GiB RSS — well within the
          # runner. Race behaviour under concurrency is covered separately by
          # the `concurrency stress (race)` job in ci.yml. The -tags=soakfull
          # guard excludes this test from every normal run (it only compiles
          # under this build tag); -timeout is kept one hour above the 4h
          # window so a slow shutdown does not corrupt the report.
          go test \
            -tags=soakfull \
            -count=1 \
            -timeout=5h \
            -run=TestBoltSoak_1024_4h \
            ./bench/soak/... \
            2>&1 | tee soak-artefacts/soak.log
          echo "## Bolt soak result" >> "$GITHUB_STEP_SUMMARY"
          grep -E "soak: complete|invalid heap snapshot|FAIL|PASS" soak-artefacts/soak.log \
            >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload soak artefacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: soak-artefacts-${{ github.sha }}
          path: |
            soak-artefacts/
          retention-days: 30

      - name: Generate ci-report.md if the harness did not
        if: always()
        run: |
          if [[ ! -f soak-artefacts/bolt-soak-ci-report.md ]]; then
            cat > soak-artefacts/bolt-soak-ci-report.md <<EOF
          # Bolt soak — CI report

          Commit: ${{ github.sha }}
          Trigger: ${{ github.event_name }}
          Job: ${{ github.run_id }}

          See \`soak.log\` for the full transcript and the heap profile
          snapshots emitted by the test runner.
          EOF
          fi

      - name: Upload ci-report.md
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bolt-soak-ci-report-${{ github.sha }}
          path: soak-artefacts/bolt-soak-ci-report.md
          retention-days: 90
