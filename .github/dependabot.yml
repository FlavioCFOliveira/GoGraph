# Dependabot keeps the supply chain current without un-pinning it.
#
# The `github-actions` ecosystem updates the full-length commit-SHA pins in
# .github/workflows/*.yml AND the human-readable `# vX.Y.Z` comment on the
# same line in lockstep, so pinning to an immutable SHA (SEC-2026-06-14, the
# tj-actions/CVE-2025-30066 class) never freezes a security patch.
#
# The `gomod` ecosystem keeps the module's own dependency graph patched — the
# very graph the CycloneDX SBOM (gograph.cdx.json) describes for downstream
# consumers.
#
# Note: the cyclonedx-gomod SBOM generator is installed in release.yml via
# `go install ...@v1.10.0` (a shell-string pin, not a go.mod require), which
# neither ecosystem can auto-bump. Bump that pin by hand alongside these
# updates; the pin and its purpose are documented in release.yml and
# .goreleaser.yaml.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      # One PR per week for all routine action bumps keeps the noise low while
      # still surfacing each SHA change for review.
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      gomod:
        patterns:
          - "*"
