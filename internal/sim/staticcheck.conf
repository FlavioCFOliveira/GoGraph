# internal/sim/staticcheck.conf — directory-scoped override for the DST harness.
#
# The deterministic-simulation harness intentionally exercises the deprecated
# search.EppsteinKShortest shim (which redirects to KShortestPathsLoopless) to
# prove the old public entry point still works. Because internal/sim imports
# search across package boundaries, standalone `staticcheck ./...` flags those
# calls as SA1019 ("use of a deprecated function"). This is deliberate coverage,
# not a real deprecation problem, so SA1019 is disabled here. golangci-lint is
# already clean at these sites via //nolint:staticcheck directives; this keeps
# standalone `staticcheck ./...` equally clean. All other checks remain inherited.
checks = ["inherit", "-SA1019"]
