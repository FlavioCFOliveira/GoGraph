# cypher/tck/staticcheck.conf — directory-scoped override.
#
# parser_only.go retains, purely as documentation of historical TCK parser
# gaps that the normaliser now resolves, a block of intentionally-unused
# package-level symbols: the regex variables (reSingleQuoteSpace,
# reSingleQuoteTemporalArg, reVarlenBound, reVarlenDotDot, reNegHexOct,
# reLeadingDotFloat, reZeroDotFloat, reDoubleNot, reCallNoParen, reLongFloat)
# AND the matching Skip* reason constants (SkipVarlenExplicitBound …
# SkipLongFloatSema). Each carries a //nolint:unused directive for
# golangci-lint. Standalone staticcheck has no valid per-symbol U1000
# suppression, so U1000 is disabled for this WHOLE package here (golangci's
# unused linter still runs on it, so new dead code is still caught) while the
# root staticcheck.conf keeps U1000 enabled for the rest of the module.
checks = ["inherit", "-U1000"]
