# cypher/parser/gen/staticcheck.conf — directory-scoped override for
# ANTLR-generated parser/lexer code (header: "Code generated ... DO NOT EDIT.").
#
# The generated CypherParser reassigns its lookahead local (`_la`) in a few
# states without reading the prior value, which staticcheck flags as SA4006
# ("this value is never used"). That is a benign ANTLR codegen artifact in
# machine-generated, never-hand-edited code, so SA4006 is disabled here.
# golangci-lint already skips generated files wholesale; this keeps standalone
# `staticcheck ./...` equally clean. All other checks remain inherited.
checks = ["inherit", "-SA4006"]
